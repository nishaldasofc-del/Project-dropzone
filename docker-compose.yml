version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: dropzone-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
      MONGO_INITDB_DATABASE: project-dropzone
    volumes:
      - mongo_data:/data/db
      - ./database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - dropzone-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: dropzone-server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-changeme}@mongodb:27017/project-dropzone?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_IN_PRODUCTION_USE_LONG_RANDOM_STRING}
      JWT_EXPIRE: 7d
      TICK_RATE: 20
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      - server_logs:/app/server/logs
    networks:
      - dropzone-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: dropzone-nginx
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      - ssl_certs:/etc/nginx/ssl
    networks:
      - dropzone-net

volumes:
  mongo_data:
  server_logs:
  nginx_logs:
  ssl_certs:

networks:
  dropzone-net:
    driver: bridge
